name: Scoop CI

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: runs-on=${{ github.run_id }}/image=windows25-full-x64/family=m7i
    env:
      SCOOP_GH_TOKEN: ${{ github.token }}
    steps:
      - name: Configure RunsOn features
        uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2

      - name: Checkout bucket
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Scoop bucket minion (lint/format/checkhash)
        uses: ScoopInstaller/GithubActions@e174c3bef2aeec16a40f2f075cafa167733f0a3e # main
        env:
          GITHUB_TOKEN: ${{ github.token }}
          THROW_ERROR: '1'
          SCOOP_GH_TOKEN: ${{ github.token }}

      - name: Validate manifest and install
        shell: pwsh
        run: |
          $localShim = Join-Path $env:USERPROFILE "SCOOP\shims"
          $globalShim = "C:\\SCOOP\\shims"
          $env:PATH = "$localShim;$globalShim;$env:PATH"
          $env:GITHUB_TOKEN = "$env:SCOOP_GH_TOKEN"
          if (-not (Get-Command scoop -ErrorAction SilentlyContinue)) {
            iwr get.scoop.sh -useb | iex
            $env:PATH = "$localShim;$globalShim;$env:PATH"
          }

          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          $manifests = git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- "bucket/*.json" |
            ForEach-Object { [System.IO.Path]::GetFileNameWithoutExtension($_) }
          if (-not $manifests) {
            Write-Host "No bucket manifests changed; skipping install."
            exit 0
          }

          $bucketPath = (Resolve-Path .).Path -replace '\\','/'
          $bucketUrl = "file:///$bucketPath"
          scoop bucket add local $bucketUrl
          foreach ($m in $manifests) {
            scoop cache rm $m -a || $true
            scoop install $m
          }
